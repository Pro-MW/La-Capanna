<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Capanna Menu</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#e8dcc5, #d6c3a3);
  font-family: 'Georgia', serif;
  text-align: center;
}

h1 {
  margin: 20px 0;
  color: #3b2f2f;
  font-size: 28px;
  letter-spacing: 2px;
}

.container {
  padding: 10px;
}

.menu-img {
  width: 95%;
  max-width: 500px;
  margin: 20px auto;
  display: block;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.menu-img:hover {
  transform: scale(1.02);
}

/* Loading animation */
.menu-img {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.8s forwards;
}

.menu-img:nth-child(1) { animation-delay: 0.2s; }
.menu-img:nth-child(2) { animation-delay: 0.4s; }
.menu-img:nth-child(3) { animation-delay: 0.6s; }
.menu-img:nth-child(4) { animation-delay: 0.8s; }

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<h1>La Capanna Menu</h1>

<div class="container">
  <img src="menu-1.png" class="menu-img">
  <img src="menu-2.png" class="menu-img">
  <img src="menu-3.png" class="menu-img">
  <img src="menu-4.png" class="menu-img">
</div>

</body>
</html>
